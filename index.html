<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Álbum Virtual - Selección Argentina</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="header-album">
        <h1>Álbum Virtual: Campeones del Mundo</h1>
    </div>

    <div class="seccion-sobres">
        <h2>Tus Sobres Disponibles</h2>
        <button class="btn-abrir" onclick="alert('Abriendo sobre...')">Abrir Sobre</button>
        <br><br>
        <a href="registro.html" style="color: blue;">Ir al formulario de registro</a>
    </div>

    <div class="cuadricula-figuritas">
        <div class="tarjeta-figurita">
            <img src="img/lionelmessi.png" alt="Messi">
            <p>Lionel Messi</p>
            <button class="btn-pegar" id="btn-messi" onclick="pegarFigurita('btn-messi')">¡Pegar Figurita!</button>
        </div>
        
        <div class="tarjeta-figurita">
            <img src="img/emilianomartinez.png" alt="Dibu">
            <p>Dibu Martínez</p>
            <button class="btn-pegar" id="btn-dibu" onclick="pegarFigurita('btn-dibu')">¡Pegar Figurita!</button>
        </div>
    </div>

    <script>
        function pegarFigurita(idBoton) {
            let boton = document.getElementById(idBoton);
            boton.innerHTML = "¡FIGURITA PEGADA!";
            boton.style.backgroundColor = "#6c757d";
            boton.style.pointerEvents = "none";
        }
    </script>
</body>
</html>
