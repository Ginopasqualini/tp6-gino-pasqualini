<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Álbum Web</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="header-album">
        <h1>Registro de Coleccionista</h1>
    </div>

    <div class="seccion-formulario">
        <form action="#" method="GET" autocomplete="off">
            
            <label for="nombre">Nombre y Apellido:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="pass">Contraseña:</label>
            <input type="password" id="pass" name="pass" required>

            <label for="edad">Edad (6-99):</label>
            <input type="number" id="edad" name="edad" min="6" max="99" required>

            <p>Categoría de Álbum Preferido:</p>
            <input type="radio" id="inicial" name="categoria" value="inicial" checked>
            <label for="inicial">Álbum Inicial</label>
            <input type="radio" id="avanzado" name="categoria" value="avanzado">
            <label for="avanzado">Álbum Avanzado</label>

            <p>Temáticas de Interés:</p>
            <input type="checkbox" id="futbol" name="interes" value="futbol">
            <label for="futbol">Fútbol</label>
            <input type="checkbox" id="comics" name="interes" value="comics">
            <label for="comics">Cómics</label>

            <label for="seccion">Sección del Álbum a Completar:</label>
            <select id="seccion" name="seccion">
                <option value="eliminatorias">Eliminatorias</option>
                <option value="historicos">Históricos</option>
            </select>

            <label for="id_usuario">ID de Sesión:</label>
            <input type="text" id="id_usuario" name="id_usuario" value="100" readonly>
            
            <input type="hidden" name="sistema" value="SistemaAlbumWeb-v2">

            <label for="bio">Reseña o faltantes:</label>
            <textarea id="bio" name="bio" rows="4"></textarea>

            <div class="acciones">
                <input type="submit" value="ENVIAR REGISTRO">
                <input type="reset" value="RESTABLECER CAMPOS">
            </div>
        </form>
    </div>
</body>
</html>
